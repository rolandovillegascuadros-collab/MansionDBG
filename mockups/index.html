<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mockups Mansion DBG</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #111; color: #f4efe4; }
    header { padding: 24px; border-bottom: 1px solid #333; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p { margin: 0; color: #c9c0ad; }
    main { display: grid; gap: 24px; padding: 24px; }
    figure { margin: 0; padding: 16px; background: #1b1b1b; border: 1px solid #333; border-radius: 8px; }
    figcaption { margin-bottom: 12px; font-weight: 700; }
    img { display: block; max-width: 100%; height: auto; border: 1px solid #3a3429; border-radius: 6px; }
  </style>
</head>
<body>
  <header>
    <h1>Mockups reales Mansion DBG</h1>
    <p>Capturas generadas desde la app local en navegador.</p>
  </header>
  <main>
    <figure><figcaption>Ingreso - desktop</figcaption><img src="01-ingreso-desktop.png" alt="Ingreso - desktop"></figure>
    <figure><figcaption>Sala offline - desktop</figcaption><img src="02-sala-desktop.png" alt="Sala offline - desktop"></figure>
    <figure><figcaption>Partida activa con dado inicial - desktop</figcaption><img src="03-partida-desktop.png" alt="Partida activa con dado inicial - desktop"></figure>
    <figure><figcaption>Partida activa - iPhone 15 Pro Max horizontal</figcaption><img src="04-iphone-15-pro-max-horizontal.png" alt="Partida activa - iPhone 15 Pro Max horizontal"></figure>
    <figure><figcaption>Final de partida por votos - desktop</figcaption><img src="05-final-partida-desktop.png" alt="Final de partida por votos - desktop"></figure>

</html>
